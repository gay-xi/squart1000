<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>1000 Squat Sync</title>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
  :root { --primary-color: #ccff00; --accent-color: #ff0055; }
  html, body { margin: 0; padding: 0; background: #000; color: #fff; height: 100%; width: 100%; overflow: hidden; font-family: 'Arial Black', sans-serif; touch-action: manipulation; }

  /* 설정 화면 */
  #setup-screen { position: fixed; inset: 0; background: #111; z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 20px; }
  .setup-box { background: #222; padding: 2rem; border-radius: 20px; border: 3px solid var(--primary-color); width: 100%; max-width: 400px; text-align: center; }
  .input-group { margin-bottom: 20px; text-align: left; }
  label { display: block; font-size: 0.9rem; opacity: 0.7; margin-bottom: 8px; font-family: sans-serif; }
  input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px; font-size: 1.5rem; border-radius: 10px; box-sizing: border-box; }
  #start-btn { width: 100%; background: var(--primary-color); color: #000; border: none; padding: 18px; font-size: 1.4rem; font-weight: bold; border-radius: 10px; cursor: pointer; }

  /* 메인 화면 */
  #main-panel { display: none; height: 100%; width: 100%; flex-direction: column; justify-content: center; align-items: center; position: relative; box-sizing: border-box; }
  
  #sub-container { position: absolute; left: 3vw; top: 5vh; z-index: 10; }
  .sub-box { background: rgba(255, 255, 255, 0.05); border: 6px solid var(--accent-color); padding: 2rem 3rem; border-radius: 30px; text-align: center; box-shadow: 0 0 40px rgba(255, 0, 85, 0.4); }
  .sub-label-ko { color: var(--accent-color); font-size: 2.2rem; font-weight: 900; display: block; margin-bottom: 5px; }
  .sub-label-en { color: var(--accent-color); font-size: 1.2rem; font-weight: 900; opacity: 0.8; margin-bottom: 12px; display: block; letter-spacing: 1px; }
  #subs-display { font-size: 5rem; font-weight: 900; text-shadow: 0 0 20px rgba(255, 255, 255, 0.2); }

  #center-content { text-align: center; display: flex; flex-direction: column; align-items: center; width: 100%; user-select: none; }
  #day-display { font-size: 6vh; color: var(--primary-color); margin-bottom: 1vh; }
  
  #timer { font-size: 12vh; font-family: monospace; opacity: 0.8; margin-bottom: 1vh; font-weight: bold; letter-spacing: -2px; cursor: pointer; position: relative; z-index: 20; }
  
  #count { font-size: 42vh; line-height: 0.8; margin: 1vh 0; font-weight: 900; transition: transform 0.05s; }
  #bar-wrapper { position: absolute; bottom: 5vh; width: 90%; max-width: 1200px; }
  #bar-container { height: 35px; background: #222; border-radius: 20px; overflow: hidden; border: 2px solid #333; }
  #fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary-color), #00ff88); transition: width 0.3s; }
  .bump { transform: scale(1.08); color: var(--primary-color); }

  @media (max-aspect-ratio: 1/1) { 
    #sub-container { position: static; margin-bottom: 2vh; } 
    .sub-label-ko { font-size: 1.8rem; }
    #subs-display { font-size: 4rem; }
    #count { font-size: 30vh; } 
    #timer { font-size: 10vh; } 
  }
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-box">
    <h2 style="color:var(--primary-color); margin-bottom: 30px;">CHALLENGE SET</h2>
    <div class="input-group"><label>DAY</label><input type="number" id="input-day" value="1"></div>
    <div class="input-group"><label>SUBSCRIBERS</label><input type="number" id="input-subs" value="1000"></div>
    <button id="start-btn" onclick="startChallenge()">START SYNC</button>
  </div>
</div>

<div id="main-panel">
  <div id="sub-container">
    <div class="sub-box">
      <span class="sub-label-ko">구독자 수</span>
      <span class="sub-label-en">SUBSCRIBERS</span>
      <div id="subs-display">0</div>
    </div>
  </div>
  <div id="center-content">
    <div id="day-display">DAY 1</div>
    <div id="timer">00:00</div>
    <div id="count">0</div>
  </div>
  <div id="bar-wrapper"><div id="bar-container"><div id="fill"></div></div></div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDAJ5P1LqwCXbFco4a42HPWsHx8GXd4muA",
    authDomain: "squart1000.firebaseapp.com",
    databaseURL: "https://squart1000-default-rtdb.firebaseio.com",
    projectId: "squart1000",
    storageBucket: "squart1000.firebasestorage.app",
    messagingSenderId: "551493654031",
    appId: "1:551493654031:web:78bfe8ddfef889a96b357a"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const dataRef = db.ref('squat_challenge');

  let localData = { count: 0, day: 1, subs: 0, startTime: 0, started: false };
  let resetTimer;
  let lastActionTime = 0; // 중복 실행 방지용 타임스탬프

  function startChallenge() {
    const dayVal = document.getElementById("input-day").value || 1;
    const subsVal = document.getElementById("input-subs").value || 0;
    dataRef.set({ count: 0, day: dayVal, subs: subsVal, startTime: Date.now(), started: true });
  }

  const mainPanel = document.getElementById('main-panel');
  
  const handleAction = (e) => {
    // 중복 방지: 0.1초 이내의 연속 호출 차단 (mousedown/touchstart 동시 발생 대응)
    const now = Date.now();
    if (now - lastActionTime < 100) return;
    lastActionTime = now;

    if (e.target.id === 'timer') {
      // 2초 꾹 누르면 초기화 및 설정 화면 복귀
      resetTimer = setTimeout(() => {
        if(confirm("모든 데이터를 초기화하고 설정 화면으로 돌아갈까요?")) {
          dataRef.set({ 
            count: 0,
            day: 1,
            subs: 0,
            startTime: 0,
            started: false // 다시 설정 화면으로 보내는 핵심값
          });
        }
      }, 2000);
    } else {
      // 일반 클릭 시 카운트 +1
      if (localData.count < 1000) {
        dataRef.update({ count: localData.count + 1 });
      }
    }
  };

  const cancelReset = () => { if (resetTimer) clearTimeout(resetTimer); };

  // 클릭/터치 이벤트 등록
  mainPanel.addEventListener('mousedown', handleAction);
  mainPanel.addEventListener('touchstart', (e) => {
    // handleAction 호출 전 브라우저 기본 동작 방지 (줌 방지 등)
    if (e.target.id !== 'timer') e.preventDefault(); 
    handleAction(e);
  }, { passive: false });

  window.addEventListener('mouseup', cancelReset);
  window.addEventListener('touchend', cancelReset);

  dataRef.on('value', (snapshot) => {
    const data = snapshot.val();
    if (!data) return;
    localData = data;
    
    document.getElementById("count").innerText = data.count;
    document.getElementById("day-display").innerText = "DAY " + data.day;
    document.getElementById("subs-display").innerText = Number(data.subs).toLocaleString();
    document.getElementById("fill").style.width = (data.count / 10).toFixed(1) + "%";
    
    const countEl = document.getElementById("count");
    countEl.classList.remove("bump");
    void countEl.offsetWidth; 
    countEl.classList.add("bump");

    // started 상태에 따라 화면 전환
    if (data.started) {
      document.getElementById("setup-screen").style.display = "none";
      document.getElementById("main-panel").style.display = "flex";
    } else {
      document.getElementById("setup-screen").style.display = "flex";
      document.getElementById("main-panel").style.display = "none";
    }
  });

  setInterval(() => {
    if (localData.started && localData.startTime > 0) {
      const diff = Math.floor((Date.now() - localData.startTime) / 1000);
      const m = String(Math.floor(diff / 60)).padStart(2, '0');
      const s = String(diff % 60).padStart(2, '0');
      document.getElementById("timer").innerText = `${m}:${s}`;
    }
  }, 1000);
</script>
</body>
</html>
